<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analysis Records</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#0a0e1a;
    --surface:#111827;
    --card:#162032;
    --border:#1e3a5f;
    --accent:#f97316;
    --accent2:#fb923c;
    --text:#e2eaf6;
    --muted:#6b7f99;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:'DM Sans',sans-serif;
    min-height:100vh;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 40px;
    border-bottom:1px solid var(--border);
    background:rgba(10,14,26,0.9);
    backdrop-filter:blur(10px);
    position:sticky;
    top:0;
    z-index:100;
}

.logo{
    font-family:'Space Mono',monospace;
    color:var(--accent);
    font-size:1rem;
}

.nav-links{
    display:flex;
    gap:10px;
}

.nav-links a{
    text-decoration:none;
    color:var(--muted);
    border:1px solid transparent;
    padding:8px 16px;
    border-radius:8px;
    transition:0.2s;
    font-size:0.88rem;
    font-weight:600;
}

.nav-links a:hover{
    color:var(--text);
    border-color:var(--border);
}

.nav-links a.active{
    color:var(--accent);
    background:rgba(249,115,22,0.08);
    border-color:rgba(249,115,22,0.3);
}

.hero{
    text-align:center;
    padding:60px 20px 40px;
}

.badge{
    display:inline-block;
    font-family:'Space Mono',monospace;
    color:var(--accent);
    border:1px solid rgba(249,115,22,0.3);
    background:rgba(249,115,22,0.08);
    padding:6px 14px;
    border-radius:20px;
    font-size:0.72rem;
    letter-spacing:0.12em;
    margin-bottom:20px;
}

.hero h1{
    font-size:clamp(2rem,5vw,3.5rem);
    font-family:'Space Mono',monospace;
    line-height:1.2;
    margin-bottom:18px;
    background:linear-gradient(135deg,#fff,var(--accent));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.hero p{
    max-width:700px;
    margin:auto;
    color:var(--muted);
    line-height:1.8;
}

.container{
    max-width:1300px;
    margin:auto;
    padding:20px;
}

.records-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
    gap:24px;
}

.record-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:18px;
    overflow:hidden;
    transition:0.2s;
}

.record-card:hover{
    transform:translateY(-3px);
}

.record-img{
    width:100%;
    height:260px;
    object-fit:cover;
    border-bottom:1px solid var(--border);
}

.record-content{
    padding:20px;
}

.record-title{
    font-family:'Space Mono',monospace;
    color:var(--accent);
    margin-bottom:14px;
    font-size:0.95rem;
}

.record-meta{
    display:flex;
    flex-direction:column;
    gap:10px;
    font-size:0.92rem;
    color:var(--muted);
}

.record-meta span{
    color:var(--text);
    font-weight:600;
}

.loading{
    text-align:center;
    color:var(--muted);
    padding:100px 0;
    font-size:1rem;
}

footer{
    text-align:center;
    color:var(--muted);
    margin-top:60px;
    padding:20px;
    border-top:1px solid var(--border);
    font-family:'Space Mono',monospace;
}

@media(max-width:900px){
    nav{
        padding:16px 20px;
    }
}

</style>
</head>

<body>

<nav>
    <div class="logo">🧫 Colony Analyzer</div>

    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="yolo.html">YOLOv8</a>
        <a href="unet.html">UNet</a>
        <a href="records.html" class="active">Records</a>
    </div>
</nav>

<div class="hero">
    <div class="badge">DATABASE ANALYSIS HISTORY</div>

    <h1>Analysis Records</h1>

    <p>
        View all previously analyzed bacterial colony detection
        results stored in MongoDB Atlas.
    </p>
</div>

<div class="container">

    <div id="loading" class="loading">
        Loading records from MongoDB Atlas...
    </div>

    <div class="records-grid" id="records-grid"></div>

</div>

<footer>
    Colony Analyzer · MongoDB Atlas Records
</footer>

<script>

async function loadRecords(){

    try{

        const res = await fetch(
            "http://localhost:8000/records"
        );

        const data = await res.json();

        document.getElementById("loading").style.display = "none";

        const grid = document.getElementById("records-grid");

        if(data.length === 0){

            grid.innerHTML = `
                <div class="loading">
                    No records found.
                </div>
            `;

            return;
        }

        grid.innerHTML = data.map(record => `

            <div class="record-card"
            onclick="openRecord('${record._id}')"
    style="cursor:pointer;"
    >

                <img
                    class="record-img"
                    src="data:image/jpeg;base64,${record.image_base64}"
                >

                <div class="record-content">

                    <div class="record-title">
                        ${record.mode.toUpperCase()} ANALYSIS
                    </div>

                    <div class="record-meta">

                        <div>
                            Total Colonies:
                            <span>${record.total_colonies}</span>
                        </div>

                        <div>
                            Timestamp:
                            <span>
                                ${new Date(record.timestamp)
                                    .toLocaleString()}
                            </span>
                        </div>

                        <div>
                            Classes:
                            <span>
                                ${Object.keys(record.class_counts).join(", ")}
                            </span>
                        </div>

                    </div>

                </div>

            </div>

        `).join("");

    }

    catch(err){

        document.getElementById("loading").innerHTML =
            "Could not connect to backend.";

        console.error(err);
    }
}

loadRecords();



function openRecord(id){

    window.location.href =
        `record-details.html?id=${id}`;
}



</script>

</body>
</html>
